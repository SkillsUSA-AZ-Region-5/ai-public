# SearXNG config for the local AI stack. Merges over SearXNG defaults.
use_default_settings: true
server:
  secret_key: "adcfd73b2d9bb0225be64b7f059d4f41e954945ec7b46eef3c0fe2860767c20d"
  limiter: false          # don't rate-limit OpenWebUI's automated queries
  image_proxy: true
search:
  safe_search: 0
  formats:                # JSON is REQUIRED for OpenWebUI; off by default
    - html
    - json

# Curated extra engines (no API key, no base_url needed). Merged by name into the
