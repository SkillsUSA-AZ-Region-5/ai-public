# OpenWebUI chat front-end, talking to LM Studio running on the Windows host.
# Runtime: Docker Engine (CE) installed INSIDE a WSL2 Ubuntu distro (no Docker Desktop).
# Containers reach the Windows host via its LAN IP - HOST_LAN_IP in .env is the ONE
# place it lives; compose interpolates it everywhere below. (host.docker.internal does
# not route to the host from bridged containers under WSL NAT networking.)
# LM Studio must be serving on 0.0.0.0:1234 with the firewall open (rule exists).
services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    ports:
      - "3000:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # Chat goes through LiteLLM (compose network) so token usage is metered per user.
      # LiteLLM proxies to LM Studio. Rollback: point this back at http://${HOST_LAN_IP}:1234/v1
      # with OPENAI_API_KEY=${OPENAI_API_KEY}.
      - OPENAI_API_BASE_URL=http://litellm:4000/v1
      - OPENAI_API_KEY=${LITELLM_KEY_OPENWEBUI}            # per-app LiteLLM virtual key (alias: openwebui)
      - ENABLE_FORWARD_USER_INFO_HEADERS=true              # send X-OpenWebUI-User-* so usage attributes per user
      - ENABLE_OLLAMA_API=false         # we're using LM Studio, not Ollama
      - WEBUI_AUTH=true                 # set to false for a single-user, no-login box
      - WEBUI_NAME=SkillsUSA            # app/tab name (branding)
      # --- web search via self-hosted SearXNG (reached over the compose network) ---
      - ENABLE_WEB_SEARCH=true
      - WEB_SEARCH_ENGINE=searxng
      - SEARXNG_QUERY_URL=http://searxng:8080/search?q=<query>
      - WEB_SEARCH_RESULT_COUNT=2
      - WEB_SEARCH_CONCURRENT_REQUESTS=10
      # FULL-CONTEXT mode: inject fetched pages directly, skipping the broken get_sources
      # path in OpenWebUI 0.9.6 (it dropped web results as "untrusted collection" -> sources:[]).
      # Result count kept at 2 + gemma loaded at 32k context so it fits without overflow.
      - BYPASS_WEB_SEARCH_EMBEDDING_AND_RETRIEVAL=true
      # --- code interpreter + code execution via the Jupyter sandbox container ---
      - ENABLE_CODE_INTERPRETER=true
      - CODE_INTERPRETER_ENGINE=jupyter
      - CODE_INTERPRETER_JUPYTER_URL=http://jupyter:8888
      - CODE_INTERPRETER_JUPYTER_AUTH=token
      - CODE_INTERPRETER_JUPYTER_AUTH_TOKEN=${JUPYTER_TOKEN}
      - CODE_EXECUTION_ENGINE=jupyter
      - CODE_EXECUTION_JUPYTER_URL=http://jupyter:8888
      - CODE_EXECUTION_JUPYTER_AUTH=token
      - CODE_EXECUTION_JUPYTER_AUTH_TOKEN=${JUPYTER_TOKEN}
      # --- RAG embeddings via GPU (LM Studio nomic) instead of slow in-container CPU MiniLM ---
      - RAG_EMBEDDING_ENGINE=openai
      - RAG_EMBEDDING_MODEL=text-embedding-nomic-embed-text-v1.5
      - RAG_OPENAI_API_BASE_URL=http://${HOST_LAN_IP}:1234/v1
      - RAG_OPENAI_API_KEY=${OPENAI_API_KEY}
      - RAG_EMBEDDING_BATCH_SIZE=64
      # --- image generation via the local ComfyUI container (Flux.1-dev fp8) ---
      # Only serves images while `stack profile image` is up (ComfyUI is profile-gated).
      # The ComfyUI workflow + node mapping is set once in Admin > Settings > Images
      # (import comfyui/flux-workflow-api.json). See comfyui/COMFYUI.md.
      - ENABLE_IMAGE_GENERATION=true
      - IMAGE_GENERATION_ENGINE=comfyui
      - COMFYUI_BASE_URL=http://comfyui:8188
      - IMAGE_GENERATION_MODEL=flux1-dev-fp8.safetensors
      - IMAGE_SIZE=1024x1024
      - IMAGE_STEPS=20
      # The Flux workflow + node mapping (model/prompt/size/steps/seed). Without these,
      # OpenWebUI submits its built-in SD workflow with no model injected (ckpt_name
      # 'model.safetensors') and ComfyUI 400s. Values live in .env (built from
      # comfyui/flux-workflow-api.json by comfyui/build-owui-workflow.py).
      - COMFYUI_WORKFLOW=${COMFYUI_WORKFLOW}
      - COMFYUI_WORKFLOW_NODES=${COMFYUI_WORKFLOW_NODES}
    volumes:
      # Bind mount to the WSL ext4 filesystem (NOT /mnt/c - SQLite WAL breaks on 9p).
      # Browse from Windows at \\wsl.localhost\Ubuntu-24.04\srv\local-ai-stack\openwebui
      - /srv/local-ai-stack/openwebui:/app/backend/data
      # --- SkillsUSA branding: orange theme + logo/favicons (generate_assets.py builds these) ---
      - ./openwebui/branding/custom.css:/app/build/static/custom.css:ro
      - ./openwebui/branding/logo.png:/app/build/static/logo.png:ro
      - ./openwebui/branding/splash.png:/app/build/static/splash.png:ro
      - ./openwebui/branding/splash-dark.png:/app/build/static/splash-dark.png:ro
      - ./openwebui/branding/favicon.png:/app/build/static/favicon.png:ro
      - ./openwebui/branding/favicon.png:/app/build/favicon.png:ro
      - ./openwebui/branding/favicon-96x96.png:/app/build/static/favicon-96x96.png:ro
      - ./openwebui/branding/favicon-dark.png:/app/build/static/favicon-dark.png:ro
      - ./openwebui/branding/favicon.ico:/app/build/static/favicon.ico:ro
      - ./openwebui/branding/favicon.svg:/app/build/static/favicon.svg:ro
      - ./openwebui/branding/apple-touch-icon.png:/app/build/static/apple-touch-icon.png:ro
      - ./openwebui/branding/web-app-manifest-192x192.png:/app/build/static/web-app-manifest-192x192.png:ro
      - ./openwebui/branding/web-app-manifest-512x512.png:/app/build/static/web-app-manifest-512x512.png:ro
    restart: unless-stopped

  # OPTIONAL: route OpenWebUI through the Memori proxy instead of straight to LM Studio
  # to get automatic memory in chat too (Stage 5). Uncomment and set
  # OPENAI_API_BASE_URL above to http://memori-proxy:8088/v1 .
  # memori-proxy:
  #   build: ./memori/proxy
  #   container_name: memori-proxy
  #   ports:
  #     - "8088:8088"
  #   extra_hosts:
  #     - "host.docker.internal:host-gateway"
  #   environment:
  #     - LMSTUDIO_BASE_URL=http://host.docker.internal:1234/v1
  #   volumes:
  #     - ./memori/data:/data
  #   restart: unless-stopped

  # OPTIONAL high-throughput inference engine (OpenAI-compatible on :8000).
  # OFF by default (profile) so it doesn't fight LM Studio for VRAM.
  # Start it explicitly:   docker compose --profile vllm up -d vllm
  #
  # !! BLACKWELL/WSL BLOCKER (2026-06-11, vLLM 0.22.1): on the RTX 5060 Ti (sm_120) under
  # WSL2, vLLM loads + warms up fine but every inference DEADLOCKS compiling the Triton
  # kernel _compute_slot_mapping_kernel (CPU+GPU idle, never caches). Tried: FlashInfer
  # backend, latest image, full warmup (no enforce-eager), disabling prefix-cache/chunked-
  # prefill - none fixed it. It's an upstream Triton+sm_120+WSL issue. Use LM Studio for now
  # (works great on Blackwell); revisit vLLM with a newer image. Settings below are kept
  # Blackwell-appropriate for when it's fixed.
  # Then add http://localhost:8000/v1 as a second OpenAI connection in OpenWebUI,
  # or point Cline/Memori at it instead of :1234.
  vllm:
    image: vllm/vllm-openai:latest
    container_name: vllm
    profiles: ["vllm"]
    ports:
      - "8000:8000"
    ipc: host                       # vLLM needs host IPC / large shm
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
      # Blackwell (RTX 50-series, sm_120): the default Triton attention path hangs
      # JIT-compiling kernels; FlashInfer ships SM120 kernels and works.
      - VLLM_ATTENTION_BACKEND=FLASHINFER
    volumes:
      - /srv/local-ai-stack/hf-cache:/root/.cache/huggingface
    command: >
      --model ${VLLM_MODEL}
      --gpu-memory-utilization ${VLLM_GPU_MEM_UTIL}
      --max-model-len ${VLLM_MAX_MODEL_LEN}
      --api-key ${OPENAI_API_KEY}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["1"]     # GPU1 (more spare VRAM) for the coexistence test.
              # For both cards instead, use:  count: all  (and add
              # --tensor-parallel-size 2 to command). NCCL multi-GPU under WSL2
              # can be flaky on NVLink-less consumer cards - test single-GPU first.
              capabilities: [gpu]
    restart: unless-stopped

  # ComfyUI image generation (Flux.1-dev fp8). Profile-gated like vllm, so it only starts
  # with `stack profile image`, which unloads the chat model to free VRAM. Built locally for
  # Blackwell (cu128, see comfyui/Dockerfile). OpenWebUI reaches it at http://comfyui:8188.
  comfyui:
    build: ./comfyui
    image: comfyui-cu128:latest
    container_name: comfyui
    profiles: ["image"]
    ports:
      - "127.0.0.1:8188:8188"      # localhost only; LAN-expose via `stack expose` if wanted
    environment:
      # Pin Flux to GPU1 so LM Studio can keep a chat model on GPU0 (image + chat coexist).
      # device_ids under deploy doesn't restrict the container under WSL2 (all GPUs stay
      # visible), so we pin at the CUDA level: ComfyUI then only uses physical GPU1.
      - CUDA_VISIBLE_DEVICES=1
    volumes:
      - /srv/local-ai-stack/comfyui/models:/opt/ComfyUI/models
      - /srv/local-ai-stack/comfyui/output:/opt/ComfyUI/output
      - /srv/local-ai-stack/comfyui/input:/opt/ComfyUI/input
      - /srv/local-ai-stack/comfyui/custom_nodes:/opt/ComfyUI/custom_nodes
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  # Postgres for LiteLLM: enables virtual keys (per-app sk- keys), budgets, rate limits, spend
  # tracking, and the admin UI at :4000/ui. The config-driven models + master key still work
  # without it; this only ADDS key management. Internal only (no host port). Data on ext4.
  litellm-db:
    image: postgres:16-alpine
    container_name: litellm-db
    environment:
      - POSTGRES_USER=litellm
      - POSTGRES_PASSWORD=${LITELLM_DB_PASSWORD}
      - POSTGRES_DB=litellm
    volumes:
      - /srv/local-ai-stack/litellm-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litellm -d litellm"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # LiteLLM gateway: one OpenAI endpoint -> LM Studio. Maps model names (litellm/config.yaml);
  # with litellm-db it also manages virtual keys + budgets + the admin UI.
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: litellm
    ports:
      - "4000:4000"
    volumes:
      - ./litellm/config.yaml:/app/config.yaml
      - ./litellm/usage_callback.py:/app/usage_callback.py   # token-usage success callback
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    depends_on:
      litellm-db:
        condition: service_healthy
    environment:
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY}
      # --- Postgres-backed key management: virtual keys, budgets, rate limits, UI (:4000/ui) ---
      - DATABASE_URL=postgresql://litellm:${LITELLM_DB_PASSWORD}@litellm-db:5432/litellm
      - STORE_MODEL_IN_DB=False                  # keep models in config.yaml, not the DB
      - LITELLM_SALT_KEY=${LITELLM_SALT_KEY}      # encrypts secrets stored in the DB
      - UI_USERNAME=${LITELLM_UI_USERNAME}        # admin UI login (separate from the master key)
      - UI_PASSWORD=${LITELLM_UI_PASSWORD}
      - LMSTUDIO_API_KEY=${OPENAI_API_KEY}
      - LMSTUDIO_BASE_URL=http://${HOST_LAN_IP}:1234/v1   # config.yaml reads this
      - LMSTUDIO_SCHEDULER_BASE_URL=http://${HOST_LAN_IP}:1235/v1
      - KIMI_PROXY_BASE_URL=${KIMI_PROXY_BASE_URL:-http://${HOST_LAN_IP}:8095/v1}
      - PYTHONPATH=/app                                    # so usage_callback imports
      # token usage -> your external InfluxDB (usage_callback.py). Values from .env.
      - INFLUX_URL=${INFLUX_URL:-}
      - INFLUX_ORG=${INFLUX_ORG:-}
      - INFLUX_BUCKET=${INFLUX_BUCKET:-}
      - INFLUX_TOKEN=${INFLUX_TOKEN:-}
      - INFLUX_MEASUREMENT=${INFLUX_MEASUREMENT:-llm_usage}
      # also feed the local dashboard usage card (works without Influx)
      - USAGE_INGEST_URL=http://${HOST_LAN_IP}:8090/api/usage/event
      - USAGE_INGEST_TOKEN=${USAGE_INGEST_TOKEN:-}
    restart: unless-stopped

  # Qdrant vector store for Mem0 (ext4-backed, like the other data).
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
    volumes:
      - /srv/local-ai-stack/qdrant:/qdrant/storage
    restart: unless-stopped

  # Jupyter sandbox for OpenWebUI's Code Interpreter (the model writes + runs Python here).
  # scipy-notebook ships numpy/pandas/matplotlib/scipy. Reached at http://jupyter:8888.
  jupyter:
    image: quay.io/jupyter/scipy-notebook:latest
    container_name: jupyter
    environment:
      - JUPYTER_TOKEN=${JUPYTER_TOKEN}
    volumes:
      - /srv/local-ai-stack/jupyter:/home/jovyan/work
    restart: unless-stopped

  # Self-hosted privacy-respecting metasearch. OpenWebUI queries it at
  # http://searxng:8080 over the compose network (JSON format enabled in settings.yml).
  # Also published on localhost:8081 so HOST-side search MCPs (Cline, Claude Code) can
  # query it. 127.0.0.1 only - never LAN-exposed (no auth on SearXNG).
  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    ports:
      - "127.0.0.1:8081:8080"
    volumes:
      - ./searxng:/etc/searxng
    environment:
      - SEARXNG_BASE_URL=http://searxng:8080/
    restart: unless-stopped
